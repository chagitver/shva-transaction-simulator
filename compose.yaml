name: shva-transaction-simulator

services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    platform: linux/amd64
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:-Your_strong_Password123}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q 'SELECT 1' -b -o /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 25s

  api:
    build:
      context: ./server/Shva.Api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DataProtection__KeysPath: /keys
      ConnectionStrings__DefaultConnection: Server=db,1433;Database=ShvaTransactions;User Id=sa;Password=${MSSQL_SA_PASSWORD:-Your_strong_Password123};TrustServerCertificate=True
    ports:
      - "5080:8080"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - data-protection-keys:/keys
    restart: unless-stopped

  client:
    build:
      context: ./client
    ports:
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  sqlserver-data:
  data-protection-keys:
